services:

  mysql:
    image: mysql:8.0
    container_name: autoservicio-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: autoservicio_green
    ports:
      - "3306:3306"
    volumes:
      - ./autoservicio_green.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  ms-inventario:
    build:
      context: .
      dockerfile: ms-inventario/Dockerfile
    container_name: ms-inventario
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      DB_URL: "jdbc:mysql://mysql:3306/autoservicio_green?useSSL=false&serverTimezone=UTC"
      DB_USER: "root"
      DB_PASSWORD: ""
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
      - "9081:9081"

  ms-ventas:
    build:
      context: .
      dockerfile: ms-ventas/Dockerfile
    container_name: ms-ventas
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      DB_URL: "jdbc:mysql://mysql:3306/autoservicio_green?useSSL=false&serverTimezone=UTC"
      DB_USER: "root"
      DB_PASSWORD: ""
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
      - "9082:9082"

  ms-gateway:
    build:
      context: .
      dockerfile: ms-gateway/Dockerfile
    container_name: ms-gateway
    restart: unless-stopped
    environment:
      GATEWAY_TOKEN: "AUTOSERVICIO_GREEN_2024"
      MS_INVENTARIO_HOST: "ms-inventario"
      MS_VENTAS_HOST: "ms-ventas"
    depends_on:
      - ms-inventario
      - ms-ventas
    ports:
      - "8080:8080"

  ms-consola:
    build:
      context: .
      dockerfile: ms-consola/Dockerfile
    container_name: ms-consola
    stdin_open: true
    tty: true
    environment:
      MS_INVENTARIO_HOST: "ms-inventario"
      MS_VENTAS_HOST: "ms-ventas"
    depends_on:
      - ms-inventario
      - ms-ventas

  prometheus:
    image: prom/prometheus:latest
    container_name: autoservicio-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - ms-gateway
      - ms-inventario
      - ms-ventas

  grafana:
    image: grafana/grafana:latest
    container_name: autoservicio-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
